# =============================================================================
# Prometheus Configuration
# =============================================================================
# Prometheus scrapes metrics from all services at regular intervals.
# Each job targets a specific service endpoint exposing metrics.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: microservices-orchestrator
    environment: development

# ---------------------------------------------------------------------------
# Alertmanager Configuration
# ---------------------------------------------------------------------------
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ---------------------------------------------------------------------------
# Rule Files
# ---------------------------------------------------------------------------
rule_files:
  - /etc/prometheus/rules/*.yml

# ---------------------------------------------------------------------------
# Scrape Configurations
# ---------------------------------------------------------------------------
scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 30s

  # Nginx reverse proxy
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:8080"]
    metrics_path: /nginx_status
    scrape_interval: 15s

  # API service metrics
  - job_name: "api"
    static_configs:
      - targets: ["api:5000"]
    metrics_path: /health/metrics
    scrape_interval: 15s

  # Worker service metrics
  - job_name: "worker"
    static_configs:
      - targets: ["worker:5001"]
    metrics_path: /health/metrics
    scrape_interval: 15s

  # Node exporter (host metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s

  # cAdvisor (container metrics)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 15s

  # PostgreSQL (via postgres_exporter if available)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
    scrape_interval: 30s

  # Redis (via redis_exporter if available)
  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    scrape_interval: 30s

  # Celery monitoring
  - job_name: "celery"
    static_configs:
      - targets: ["worker:5001"]
    metrics_path: /health/metrics
    scrape_interval: 30s

