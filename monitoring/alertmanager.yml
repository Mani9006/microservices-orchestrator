# =============================================================================
# Alertmanager Configuration
# =============================================================================
# Routes alerts to appropriate notification channels based on severity
# and service type.
# =============================================================================

global:
  smtp_smarthost: 'mailhog:1025'
  smtp_from: 'alerts@microservices.local'
  smtp_require_tls: false
  
  slack_api_url: ''
  pagerduty_url: ''

  resolve_timeout: 5m

# Route definitions
templates:
- '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    # Critical alerts -> immediate notification
    - match:
        severity: critical
      receiver: critical
      group_wait: 10s
      repeat_interval: 1h
    
    # Warning alerts -> standard notification
    - match:
        severity: warning
      receiver: warning
      group_interval: 10m
      repeat_interval: 6h
    
    # Service-specific routing
    - match_re:
        service: api|nginx
      receiver: frontend-alerts
    
    - match_re:
        service: worker|beat
      receiver: worker-alerts

# Receivers (notification channels)
receivers:
  - name: default
    email_configs:
      - to: 'devops@example.com'
        headers:
          Subject: 'Microservices Alert'
        send_resolved: true

  - name: critical
    email_configs:
      - to: 'oncall@example.com'
        headers:
          Subject: 'CRITICAL: Microservices Alert'
        send_resolved: true
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: 'Critical Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: warning
    email_configs:
      - to: 'devops@example.com'
        headers:
          Subject: 'WARNING: Microservices Alert'
        send_resolved: true

  - name: frontend-alerts
    email_configs:
      - to: 'frontend-team@example.com'
        headers:
          Subject: 'Frontend Service Alert'
        send_resolved: true

  - name: worker-alerts
    email_configs:
      - to: 'backend-team@example.com'
        headers:
          Subject: 'Worker Service Alert'
        send_resolved: true

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
