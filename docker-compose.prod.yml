# =============================================================================
# Docker Compose - Production Overrides
# =============================================================================
# Production-specific overrides for the base Docker Compose configuration.
# These settings optimize for performance, security, and reliability in
# production environments.
# =============================================================================

version: "3.8"

services:
  # -------------------------------------------------------------------------
  # PostgreSQL - Production
  # -------------------------------------------------------------------------
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    environment:
      # Production database settings
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Connection limits
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # Production backup scripts
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    # Production health check with stricter timing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=postgres,env=production"

  # -------------------------------------------------------------------------
  # Redis - Production
  # -------------------------------------------------------------------------
  redis:
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --timeout 0
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # -------------------------------------------------------------------------
  # API - Production
  # -------------------------------------------------------------------------
  api:
    build:
      target: production
    restart: always
    deploy:
      replicas: 2  # Scale API horizontally
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      # Rolling update configuration
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      LOG_FORMAT: json
      # Production connection pool settings
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      # Rate limiting
      RATELIMIT_STORAGE_URI: redis://:${REDIS_PASSWORD}@redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=api,env=production"
    # Do not expose API port directly - only through nginx
    ports: !reset []

  # -------------------------------------------------------------------------
  # Worker - Production
  # -------------------------------------------------------------------------
  worker:
    build:
      target: production
    restart: always
    deploy:
      replicas: 2  # Multiple workers for throughput
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      # Production Celery settings
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-8}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-600}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-540}
      WORKER_MAX_TASKS: ${WORKER_MAX_TASKS:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      LOG_FORMAT: json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=worker,env=production"

  # -------------------------------------------------------------------------
  # Beat - Production
  # -------------------------------------------------------------------------
  beat:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # -------------------------------------------------------------------------
  # Nginx - Production
  # -------------------------------------------------------------------------
  nginx:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      # Rolling update
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: rollback
        order: start-first
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=nginx,env=production"
    # Mount SSL certificates in production
    volumes:
      - ${SSL_CERT_PATH:-./certs}:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx

  # -------------------------------------------------------------------------
  # Logger - Production
  # -------------------------------------------------------------------------
  logger:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# ---------------------------------------------------------------------------
# Override Volumes for Production
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-/var/lib/microservices/data}/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-/var/lib/microservices/data}/redis
