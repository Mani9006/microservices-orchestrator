# =============================================================================
# Docker Compose - Base Configuration
# =============================================================================
# Base Docker Compose file defining all services for the microservices
# orchestrator. This file is used for development and as a foundation
# for production overrides.
# =============================================================================

version: "3.8"

# ---------------------------------------------------------------------------
# Service Definitions
# ---------------------------------------------------------------------------
services:
  # -------------------------------------------------------------------------
  # PostgreSQL Database Service
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-microservices}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-microservices}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=postgres"
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # -------------------------------------------------------------------------
  # Redis Cache & Message Broker Service
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ms-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    sysctls:
      - net.core.somaxconn=1024
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------------------
  # API Service
  # -------------------------------------------------------------------------
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: production
    container_name: ms-api
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-microservices}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      APP_PORT: 5000
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      RATELIMIT_STORAGE_URI: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      WORKER_HOST: worker
      WORKER_PORT: 5001
    volumes:
      - api_logs:/app/logs
    ports:
      - "${API_PORT:-5000}:5000"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=api"
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------------------
  # Background Worker Service
  # -------------------------------------------------------------------------
  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
      target: production
    container_name: ms-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-4}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-300}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-240}
      CELERY_RESULT_EXPIRES: ${CELERY_RESULT_EXPIRES:-3600}
      CELERY_MAX_RETRIES: ${CELERY_MAX_RETRIES:-3}
      CELERY_RETRY_DELAY: ${CELERY_RETRY_DELAY:-60}
      WORKER_MAX_TASKS: ${WORKER_MAX_TASKS:-1000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      API_URL: http://api:5000
      WORKER_PORT: 5001
      HOSTNAME: ms-worker
      TZ: ${TZ:-UTC}
    volumes:
      - worker_logs:/app/logs
    ports:
      - "${WORKER_PORT:-5001}:5001"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=worker"
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------------------
  # Celery Beat (Scheduler) Service
  # -------------------------------------------------------------------------
  beat:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
      target: production
    container_name: ms-beat
    restart: unless-stopped
    command: >
      celery -A src.worker worker
      --loglevel=info
      --beat
      --scheduler redis
      --without-heartbeat
      --without-gossip
      --without-mingle
      -Q default,high-priority,low-priority
      -n beat@%h
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_URL: http://api:5000
      TZ: ${TZ:-UTC}
    volumes:
      - beat_logs:/app/logs
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.worker inspect ping --timeout 5 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=beat"
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # -------------------------------------------------------------------------
  nginx:
    build:
      context: ./services/nginx
      dockerfile: Dockerfile
    container_name: ms-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${NGINX_HEALTH_PORT:-8080}:8080"
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=nginx"
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # -------------------------------------------------------------------------
  # Log Aggregation Service
  # -------------------------------------------------------------------------
  logger:
    image: fluent/fluent-bit:2.2
    container_name: ms-logger
    restart: unless-stopped
    volumes:
      - api_logs:/logs/api:ro
      - worker_logs:/logs/worker:ro
      - beat_logs:/logs/beat:ro
      - nginx_logs:/var/log/nginx:ro
      - ./services/logger/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
    ports:
      - "${FLUENT_PORT:-24224}:24224"
    networks:
      - backend
    depends_on:
      - api
      - worker
    healthcheck:
      test: ["CMD", "pgrep", "fluent-bit"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

# ---------------------------------------------------------------------------
# Named Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/redis
  api_logs:
    driver: local
  worker_logs:
    driver: local
  beat_logs:
    driver: local
  nginx_logs:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24
  backend:
    driver: bridge
    internal: true  # No external access for backend services
    ipam:
      config:
        - subnet: 172.28.2.0/24
