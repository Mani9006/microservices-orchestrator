# =============================================================================
# Fluent Bit Configuration - Log Aggregation
# =============================================================================
# Collects logs from all services and forwards them to a centralized
# destination. Supports parsing, filtering, and routing of log streams.
# =============================================================================

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

# ---------------------------------------------------------------------------
# Input: API Service Logs
# ---------------------------------------------------------------------------
[INPUT]
    Name              tail
    Tag               api.logs
    Path              /logs/api/*.log
    Parser            json
    DB                /tmp/fluent-bit-api.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# ---------------------------------------------------------------------------
# Input: Worker Service Logs
# ---------------------------------------------------------------------------
[INPUT]
    Name              tail
    Tag               worker.logs
    Path              /logs/worker/*.log
    Parser            json
    DB                /tmp/fluent-bit-worker.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# ---------------------------------------------------------------------------
# Input: Nginx Access Logs
# ---------------------------------------------------------------------------
[INPUT]
    Name              tail
    Tag               nginx.access
    Path              /var/log/nginx/access.log
    Parser            json
    DB                /tmp/fluent-bit-nginx.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# ---------------------------------------------------------------------------
# Input: Nginx Error Logs
# ---------------------------------------------------------------------------
[INPUT]
    Name              tail
    Tag               nginx.error
    Path              /var/log/nginx/error.log
    Parser            nginx_error
    DB                /tmp/fluent-bit-nginx-error.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# ---------------------------------------------------------------------------
# Filter: Add Metadata
# ---------------------------------------------------------------------------
[FILTER]
    Name      modify
    Match     *.logs
    Add       service microservices
    Add       environment ${FLASK_ENV}

# ---------------------------------------------------------------------------
# Filter: Add Timestamp
# ---------------------------------------------------------------------------
[FILTER]
    Name      record_modifier
    Match     *
    Record    fluent_timestamp ${TIMESTAMP}

# ---------------------------------------------------------------------------
# Output: Standard Output (for development)
# ---------------------------------------------------------------------------
[OUTPUT]
    Name   stdout
    Match  *
    Format json_lines

# ---------------------------------------------------------------------------
# Output: Forward to external log aggregator (optional)
# ---------------------------------------------------------------------------
# [OUTPUT]
#     Name          forward
#     Match         *
#     Host          fluentd-aggregator
#     Port          24224
#     tls           off
#     tls.verify    off

# ---------------------------------------------------------------------------
# Parsers
# ---------------------------------------------------------------------------
[PARSER]
    Name        json
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name        nginx_error
    Format      regex
    Regex       ^(?<time>[^ ]+ [^ ]+) \[(?<level>[^\]]+)\] (?<pid>\d+)#(?<tid>\d+): \*(?<cid>\d+) (?<message>.*)$
    Time_Key    time
    Time_Format %Y/%m/%d %H:%M:%S
