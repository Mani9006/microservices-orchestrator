# =============================================================================
# Nginx Configuration - Microservices Reverse Proxy
# =============================================================================
# Production-grade Nginx configuration with:
# - Upstream load balancing to API backends
# - Request rate limiting and connection limiting
# - Gzip compression
# - Security headers
# - Health check endpoint
# - Request logging
# - Graceful error handling
# =============================================================================

# ---------------------------------------------------------------------------
# Main Context
# ---------------------------------------------------------------------------
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ---------------------------------------------------------------------------
# Events Module
# ---------------------------------------------------------------------------
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

# ---------------------------------------------------------------------------
# HTTP Module
# ---------------------------------------------------------------------------
http {
    # -----------------------------------------------------------------------
    # Basic Settings
    # -----------------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    charset utf-8;
    server_tokens off;
    
    # -----------------------------------------------------------------------
    # Performance Tuning
    # -----------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    
    # -----------------------------------------------------------------------
    # Request Size Limits
    # -----------------------------------------------------------------------
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    
    # -----------------------------------------------------------------------
    # Timeouts
    # -----------------------------------------------------------------------
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 60;
    
    # -----------------------------------------------------------------------
    # Gzip Compression
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;
    
    # -----------------------------------------------------------------------
    # Logging Format
    # -----------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'rid="$request_id"';
    
    # JSON logging format for structured log aggregation
    log_format json_combined escape=json
        '{"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_id":"$request_id",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time"}';
    
    access_log /var/log/nginx/access.log json_combined;
    
    # -----------------------------------------------------------------------
    # Rate Limiting Zones
    # -----------------------------------------------------------------------
    # General API rate limit: 100 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    
    # Strict rate limit for auth endpoints: 10 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    
    # Burst limit for general endpoints
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;
    
    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    
    # -----------------------------------------------------------------------
    # Request ID Generation
    # -----------------------------------------------------------------------
    map $http_x_request_id $request_id {
        default $http_x_request_id;
        "" $request_id_internal;
    }
    
    map $host $request_id_internal {
        default "";
    }
    
    # -----------------------------------------------------------------------
    # Upstream Definitions
    # -----------------------------------------------------------------------
    
    # API service upstream with least-connections load balancing
    upstream api_backend {
        least_conn;
        
        server api:5000 weight=5 max_fails=3 fail_timeout=30s;
        
        # Health check parameters
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }
    
    # Worker health check upstream
    upstream worker_backend {
        server worker:5001 weight=3 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }
    
    # -----------------------------------------------------------------------
    # Include Server Configurations
    # -----------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
    
    # -----------------------------------------------------------------------
    # Internal Health Check Server (port 8080)
    # -----------------------------------------------------------------------
    server {
        listen 8080;
        server_name localhost;
        
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }
        
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
    }
    
    # -----------------------------------------------------------------------
    # Main HTTP Server (port 80)
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name _;  # Accept any server name
        
        # Generate request ID if not provided by client
        add_header X-Request-ID $request_id always;
        
        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        
        # CORS Headers (customize as needed)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID" always;
        
        # Handle CORS preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
        
        # Connection limiting
        limit_conn addr 50;
        
        # -------------------------------------------------------------------
        # Health Check Endpoint (proxied to API)
        # -------------------------------------------------------------------
        location /health {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
        
        # -------------------------------------------------------------------
        # API Endpoints
        # -------------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_conn addr 20;
            
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings for API responses
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }
        
        # -------------------------------------------------------------------
        # Root Endpoint
        # -------------------------------------------------------------------
        location / {
            limit_req zone=general burst=50 nodelay;
            
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
        
        # -------------------------------------------------------------------
        # Worker Health Check
        # -------------------------------------------------------------------
        location /worker/health {
            limit_req zone=general burst=10 nodelay;
            
            proxy_pass http://worker_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
        
        # -------------------------------------------------------------------
        # Error Pages
        # -------------------------------------------------------------------
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            return 500 '{"error":"Internal Server Error","message":"The server encountered an error","status_code":500}';
            add_header Content-Type application/json;
        }
        
        error_page 404 /404.html;
        location = /404.html {
            return 404 '{"error":"Not Found","message":"The requested resource was not found","status_code":404}';
            add_header Content-Type application/json;
        }
        
        error_page 429 /429.html;
        location = /429.html {
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later.","status_code":429}';
            add_header Content-Type application/json;
        }
        
        # -------------------------------------------------------------------
        # Deny Access to Hidden Files
        # -------------------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
